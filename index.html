<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>観光プロトタイプ</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: sans-serif; }
#map { height: 60vh; }
#info { padding:10px; }
button { padding:10px; margin:5px 0; }

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#fff;
  padding:20px;
  width:90%;
  max-width:400px;
}
#rewardBtn {
  position: fixed;
  top:10px;
  right:10px;
  font-size:24px;
  display:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="info">
  <button onclick="getLocation()">現在地取得</button>
  <div id="progress">回答数: 0</div>
</div>

<button id="rewardBtn" onclick="openReward()">🎁</button>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="spotName"></h3>
    <p id="description"></p>

    <img id="oldImg" width="100%">
    <img id="newImg" width="100%">

    <p id="question"></p>
    <textarea id="answer" style="width:100%; height:80px;"></textarea>

    <button onclick="saveAnswer()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

// ===== データ =====
const spots = [
  {spot_id:"spot01",spot_name:"スポット1",latitude:35.506855,longitude:138.744967,radius_m:50,
    images:{old:"https://via.placeholder.com/300?text=OLD",new:"https://via.placeholder.com/300?text=NEW"},
    content:{question:"違いは？",description:"観察してください"}
  },
  {spot_id:"spot02",spot_name:"スポット2",latitude:35.506900,longitude:138.745050,radius_m:50,
    images:{old:"https://via.placeholder.com/300?text=OLD",new:"https://via.placeholder.com/300?text=NEW"},
    content:{question:"何が変わった？",description:"よく見てください"}
  },
  {spot_id:"spot03",spot_name:"スポット3",latitude:35.507000,longitude:138.745200,radius_m:50,
    images:{old:"https://via.placeholder.com/300?text=OLD",new:"https://via.placeholder.com/300?text=NEW"},
    content:{question:"特徴は？",description:"周囲に注目"}
  },
  {spot_id:"spot04",spot_name:"スポット4",latitude:35.507100,longitude:138.745300,radius_m:50,
    images:{old:"https://via.placeholder.com/300?text=OLD",new:"https://via.placeholder.com/300?text=NEW"},
    content:{question:"違いは？",description:"比較してください"}
  },
  {spot_id:"spot05",spot_name:"スポット5",latitude:35.507200,longitude:138.745400,radius_m:50,
    images:{old:"https://via.placeholder.com/300?text=OLD",new:"https://via.placeholder.com/300?text=NEW"},
    content:{question:"意味は？",description:"考えてください"}
  }
];

const config = { rewardUnlockCount: 4 };

// ===== 状態 =====
let answers = JSON.parse(localStorage.getItem("answers")||"{}");
let unlocked = JSON.parse(localStorage.getItem("unlocked")||"{}");
let rewardUnlocked = JSON.parse(localStorage.getItem("rewardUnlocked")||"false");

let map = L.map('map').setView([35.506855,138.744967],17);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};
let currentSpot = null;

// ===== マーカー生成 =====
spots.forEach(spot=>{
  let marker = L.circleMarker([spot.latitude,spot.longitude],{
    radius:10,
    color:"gray"
  }).addTo(map);

  marker.on('click',()=>{
    if(!unlocked[spot.spot_id]){
      alert("近づいてください");
      return;
    }
    openSpot(spot);
  });

  markers[spot.spot_id]=marker;
});

// ===== GPS取得 =====
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat,lon],17);

    checkDistance(lat,lon);

  },()=>alert("GPS取得失敗"));
}

// ===== 距離判定 =====
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function checkDistance(lat,lon){
  spots.forEach(spot=>{
    let d = getDistance(lat,lon,spot.latitude,spot.longitude);

    if(d <= spot.radius_m){
      unlocked[spot.spot_id]=true;
      localStorage.setItem("unlocked",JSON.stringify(unlocked));
    }

    updateMarker(spot);
  });
}

// ===== マーカー更新 =====
function updateMarker(spot){
  let marker = markers[spot.spot_id];

  if(answers[spot.spot_id]){
    marker.setStyle({color:"green"});
  }else if(unlocked[spot.spot_id]){
    marker.setStyle({color:"blue"});
  }else{
    marker.setStyle({color:"gray"});
  }
}

// ===== モーダル =====
function openSpot(spot){
  currentSpot = spot;

  document.getElementById("spotName").innerText = spot.spot_name;
  document.getElementById("description").innerText = spot.content.description;
  document.getElementById("question").innerText = spot.content.question;

  document.getElementById("oldImg").src = spot.images.old;
  document.getElementById("newImg").src = spot.images.new;

  document.getElementById("answer").value = answers[spot.spot_id] || "";

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

// ===== 保存 =====
function saveAnswer(){
  let val = document.getElementById("answer").value;
  if(!val){ alert("入力してください"); return; }

  answers[currentSpot.spot_id]=val;
  localStorage.setItem("answers",JSON.stringify(answers));

  updateProgress();
  updateMarker(currentSpot);

  closeModal();
}

// ===== 進捗 =====
function updateProgress(){
  let count = Object.keys(answers).length;
  document.getElementById("progress").innerText = "回答数: "+count;

  if(count >= config.rewardUnlockCount && !rewardUnlocked){
    rewardUnlocked=true;
    localStorage.setItem("rewardUnlocked","true");
    alert("特典が解放されました！");
  }

  if(rewardUnlocked){
    document.getElementById("rewardBtn").style.display="block";
  }
}

// ===== 特典 =====
function openReward(){
  alert("ここに特典動画を表示");
}

// 初期化
updateProgress();
spots.forEach(updateMarker);

</script>

</body>
</html>
