<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>複数スポット対応プロトタイプ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    #map {
      width: 100%;
      height: 58vh;
    }

    #info {
      background: #fff;
      padding: 14px;
      border-top: 1px solid #ddd;
    }

    .top-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #999;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .primaryBtn {
      background: #1976d2;
      color: white;
      border: none;
    }

    #progress {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    #statusText {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: #555;
      white-space: pre-line;
    }

    .legend {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.8;
    }

    .legend span {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .sectionTitle {
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    #unlockedList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .spotRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .spotRowTitle {
      font-weight: bold;
    }

    .spotRowMeta {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    #rewardBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 3000;
      display: none;
      border-radius: 999px;
      border: none;
      background: #ffd54f;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #sheetBackdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 4000;
    }

    #sheet {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-height: 88vh;
      background: #fff;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
      z-index: 5000;
      overflow: hidden;
    }

    #sheetInner {
      padding: 16px;
      overflow-y: auto;
      max-height: 88vh;
    }

    #sheet h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }

    #spotDescription,
    #spotQuestion {
      line-height: 1.6;
      margin: 10px 0;
    }

    .imgLabel {
      font-weight: bold;
      margin: 14px 0 8px;
    }

    .compareWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #f2f2f2;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .compareBase,
    .compareOverlay img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #f7f7f7;
    }

    .compareOverlay {
      position: absolute;
      inset: 0;
      width: 50%;
      overflow: hidden;
      border-right: 2px solid #ffffff;
    }

    .compareLabel {
      position: absolute;
      top: 10px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      background: rgba(0,0,0,0.65);
      border-radius: 999px;
      z-index: 5;
    }

    .compareLabel.old { left: 10px; }
    .compareLabel.new { right: 10px; }

    #compareRange {
      width: 100%;
      margin: 6px 0 2px;
    }

    .compareHint {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    #answerBox {
      width: 100%;
      min-height: 100px;
      resize: vertical;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 8px;
      margin-top: 8px;
    }

    #formMessage {
      margin-top: 8px;
      font-size: 14px;
      color: #b00020;
      min-height: 20px;
    }

    .sheetButtons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <div id="info">
    <div class="top-row">
      <button onclick="getLocation()">現在地取得</button>
    </div>

    <div id="progress">回答数: 0</div>
    <div id="statusText">地図上の丸はすべてスポットです。
灰色 = 未解放、青 = 解放済み、緑 = 回答済み</div>

    <div class="legend">
      <div><span style="background: gray;"></span>未解放</div>
      <div><span style="background: blue;"></span>解放済み</div>
      <div><span style="background: green;"></span>回答済み</div>
    </div>

    <div class="sectionTitle">開放済みスポット</div>
    <div id="unlockedList">
      <div style="color:#666; font-size:14px;">まだ開放されたスポットはありません。</div>
    </div>
  </div>

  <button id="rewardBtn" onclick="openReward()">🎁</button>

  <div id="sheetBackdrop" onclick="closeSheet()"></div>

  <div id="sheet">
    <div id="sheetInner">
      <h2 id="spotTitle">スポット</h2>

      <div id="spotDescription"></div>

      <div class="imgLabel">昔と今の比較</div>

      <div class="compareWrap">
        <div class="compareLabel old">昔</div>
        <div class="compareLabel new">今</div>

        <img id="oldImg" class="compareBase" alt="昔の画像" src="" />

        <div id="compareOverlay" class="compareOverlay">
          <img id="newImg" alt="今の画像" src="" />
        </div>
      </div>

      <input id="compareRange" type="range" min="0" max="100" value="50" oninput="updateCompareSlider(this.value)" />
      <div class="compareHint">スライダーを動かすと、昔と今の画像を見比べられます。</div>

      <div id="spotQuestion"></div>

      <textarea id="answerBox" placeholder="ここに回答を書いてください"></textarea>
      <div id="formMessage"></div>

      <div class="sheetButtons">
        <button class="primaryBtn" onclick="saveAnswer()">保存</button>
        <button onclick="closeSheet()">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const spots = [
      {
        spot_id: "spot01",
        spot_name: "スポット1",
        latitude: 35.506855,
        longitude: 138.744967,
        radius_m: 30,
        images: {
          old: "images/old.jpg",
          new: "images/new.jpg"
        },
        content: {
          question: "この場所で昔と今の違いは何だと思いますか？",
          description: "周囲をよく観察してください。"
        }
      },
      {
        spot_id: "spot02",
        spot_name: "スポット2",
        latitude: 35.506900,
        longitude: 138.745050,
        radius_m: 30,
        images: {
          old: "images/old.jpg",
          new: "images/new.jpg"
        },
        content: {
          question: "ここで変わったと感じるものは何ですか？",
          description: "景色の違いに注目してください。"
        }
      },
      {
        spot_id: "spot03",
        spot_name: "スポット3",
        latitude: 35.507000,
        longitude: 138.745200,
        radius_m: 30,
        images: {
          old: "images/old.jpg",
          new: "images/new.jpg"
        },
        content: {
          question: "この場所の特徴は何だと思いますか？",
          description: "周辺の構造を見てください。"
        }
      },
      {
        spot_id: "spot04",
        spot_name: "スポット4",
        latitude: 35.507100,
        longitude: 138.745300,
        radius_m: 30,
        images: {
          old: "images/old.jpg",
          new: "images/new.jpg"
        },
        content: {
          question: "昔と比べて変化した部分は？",
          description: "細かい違いを見てください。"
        }
      },
      {
        spot_id: "spot05",
        spot_name: "スポット5",
        latitude: 35.507200,
        longitude: 138.745400,
        radius_m: 30,
        images: {
          old: "images/old.jpg",
          new: "images/new.jpg"
        },
        content: {
          question: "この場所の意味は何だと思いますか？",
          description: "全体の流れを意識してください。"
        }
      }
    ];

    const config = {
      rewardUnlockCount: 4
    };

    let answers = JSON.parse(localStorage.getItem("answers") || "{}");
    let unlocked = JSON.parse(localStorage.getItem("unlocked") || "{}");
    let rewardUnlocked = JSON.parse(localStorage.getItem("rewardUnlocked") || "false");

    let currentSpot = null;
    const markers = {};

    const map = L.map("map").setView([35.506855, 138.744967], 17);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    spots.forEach((spot) => {
      const marker = L.circleMarker([spot.latitude, spot.longitude], {
        radius: 10,
        color: "gray",
        fillColor: "gray",
        fillOpacity: 0.8,
        weight: 2
      }).addTo(map);

      marker.bindTooltip(spot.spot_name);

      marker.on("click", () => {
        if (!unlocked[spot.spot_id]) {
          alert("このスポットの近くに移動すると情報が開放されます。");
          return;
        }
        openSpot(spot);
      });

      markers[spot.spot_id] = marker;
    });

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function getLocation() {
      if (!navigator.geolocation) {
        alert("この端末では位置情報が使えません。");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const accuracy = pos.coords.accuracy;

          map.setView([lat, lon], 17);
          checkDistance(lat, lon);

          document.getElementById("statusText").innerText =
            `現在地を取得しました。\n緯度: ${lat.toFixed(6)} / 経度: ${lon.toFixed(6)} / 精度目安: ±${Math.round(accuracy)}m`;
        },
        () => {
          alert("GPS取得に失敗しました。位置情報の許可を確認してください。");
        },
        {
          enableHighAccuracy: true,
          timeout: 30000,
          maximumAge: 30000
        }
      );
    }

    function checkDistance(lat, lon) {
      let newlyUnlocked = false;

      spots.forEach((spot) => {
        const d = getDistance(lat, lon, spot.latitude, spot.longitude);

        if (d <= spot.radius_m) {
          if (!unlocked[spot.spot_id]) {
            newlyUnlocked = true;
          }
          unlocked[spot.spot_id] = true;
        }

        updateMarker(spot);
      });

      localStorage.setItem("unlocked", JSON.stringify(unlocked));
      renderUnlockedList();

      if (newlyUnlocked) {
        document.getElementById("statusText").innerText += "\n新しいスポットが開放されました。下の一覧からも開けます。";
      }
    }

    function updateMarker(spot) {
      const marker = markers[spot.spot_id];

      if (answers[spot.spot_id]) {
        marker.setStyle({
          color: "green",
          fillColor: "green"
        });
      } else if (unlocked[spot.spot_id]) {
        marker.setStyle({
          color: "blue",
          fillColor: "blue"
        });
      } else {
        marker.setStyle({
          color: "gray",
          fillColor: "gray"
        });
      }
    }

    function openSpot(spot) {
      currentSpot = spot;

      document.getElementById("spotTitle").innerText = spot.spot_name;
      document.getElementById("spotDescription").innerText = spot.content.description;
      document.getElementById("spotQuestion").innerText = spot.content.question;
      document.getElementById("oldImg").src = spot.images.old;
      document.getElementById("newImg").src = spot.images.new;
      document.getElementById("answerBox").value = answers[spot.spot_id] || "";
      document.getElementById("formMessage").innerText = "";
      document.getElementById("compareRange").value = 50;
      updateCompareSlider(50);

      document.getElementById("sheetBackdrop").style.display = "block";
      document.getElementById("sheet").style.display = "block";
    }

    function updateCompareSlider(value) {
      document.getElementById("compareOverlay").style.width = value + "%";
    }

    function closeSheet() {
      document.getElementById("sheetBackdrop").style.display = "none";
      document.getElementById("sheet").style.display = "none";
    }

    function saveAnswer() {
      if (!currentSpot) return;

      const val = document.getElementById("answerBox").value.trim();

      if (!val) {
        document.getElementById("formMessage").innerText = "回答を入力してください。";
        return;
      }

      answers[currentSpot.spot_id] = val;
      localStorage.setItem("answers", JSON.stringify(answers));

      updateProgress();
      updateMarker(currentSpot);
      renderUnlockedList();
      closeSheet();
    }

    function updateProgress() {
      const count = Object.keys(answers).length;
      document.getElementById("progress").innerText = "回答数: " + count;

      if (count >= config.rewardUnlockCount && !rewardUnlocked) {
        rewardUnlocked = true;
        localStorage.setItem("rewardUnlocked", "true");
        alert("おめでとうございます。特典が解放されました。🎁ボタンからアクセスできます。");
      }

      if (rewardUnlocked) {
        document.getElementById("rewardBtn").style.display = "block";
      }
    }

    function openReward() {
      alert("ここに特典動画や特典ページを表示します。");
    }

    function renderUnlockedList() {
      const container = document.getElementById("unlockedList");
      const unlockedSpots = spots.filter(spot => unlocked[spot.spot_id]);

      if (unlockedSpots.length === 0) {
        container.innerHTML = '<div style="color:#666; font-size:14px;">まだ開放されたスポットはありません。</div>';
        return;
      }

      container.innerHTML = "";

      unlockedSpots.forEach(spot => {
        const row = document.createElement("div");
        row.className = "spotRow";

        const left = document.createElement("div");
        const title = document.createElement("div");
        title.className = "spotRowTitle";
        title.textContent = spot.spot_name;

        const meta = document.createElement("div");
        meta.className = "spotRowMeta";
        meta.textContent = answers[spot.spot_id] ? "回答済み" : "未回答";

        left.appendChild(title);
        left.appendChild(meta);

        const btn = document.createElement("button");
        btn.textContent = "開く";
        btn.onclick = () => openSpot(spot);

        row.appendChild(left);
        row.appendChild(btn);
        container.appendChild(row);
      });
    }

    updateProgress();
    spots.forEach(updateMarker);
    renderUnlockedList();
  </script>
</body>
</html>
